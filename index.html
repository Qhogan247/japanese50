<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JP 本機離線真人日文 104 音表</title>
<style>
  :root{--rh-px:120px}
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:#f8f9fa;color:#333;max-width:980px;margin:0 auto;padding:18px}
  h1{text-align:center;color:#2c3e50;margin:6px 0}
  .mode-tip{text-align:center;font-size:14px;color:#2ecc71;margin-bottom:12px;font-weight:600}
  .controls{background:#fff;border:1px solid #e6e9ee;border-radius:10px;padding:12px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .cg{display:flex;align-items:center;gap:8px}
  button{background:#3498db;color:#fff;border:none;padding:8px 12px;font-size:14px;border-radius:6px;cursor:pointer;font-weight:700}
  button.stop{background:#e74c3c}
  button:disabled{opacity:.5;cursor:not-allowed}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.04);margin-bottom:14px;table-layout:fixed}
  thead th{background:#34495e;color:#fff;padding:10px 6px;font-weight:700}
  th,td{border:1px solid #eef2f5;padding:12px 8px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rh{background:#f1f2f6;font-weight:700;color:#2c3e50;width:var(--rh-px);min-width:var(--rh-px);max-width:var(--rh-px)}
  #gTable th:not(.rh), #gTable td:not(.rh){width:calc((100% - var(--rh-px))/10);min-width:0}
  #dTable th:not(.rh), #dTable td:not(.rh){width:calc((100% - var(--rh-px))/5);min-width:0}
  #yTable th:not(.rh), #yTable td:not(.rh){width:calc((100% - var(--rh-px))/11);min-width:0}

  .kana-cell{cursor:pointer;background:#fff;transition:background .12s;padding:0;min-width:0}
  .kana-cell .cell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px 8px}
  .kana-cell:hover{background:#fff3bf}
  .p{font-size:20px;font-weight:800;color:#2c3e50;line-height:1;margin:0}
  .k{font-size:13px;color:#7f8c8d;margin:0}
  .r{font-size:11px;color:#95a5a6;margin:0}
  .o{font-size:11px;color:#8e44ad;display:none}
  .ko{font-size:11px;color:#d35400;display:none}
  .speaking{background:#2d9cdb!important}
  .speaking .p,.speaking .k,.speaking .r,.speaking .o,.speaking .ko{color:#fff!important}
  .empty{background:#fbfbfb}

  /* floating buttons group */
  .floating-group{
    position: fixed;
    right: 14px;
    bottom: 14px;
    display: flex;
    gap: 10px;
    z-index: 99999;
    align-items: center;
    pointer-events: none;
  }
  .floating-btn{
    pointer-events: auto;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(45,156,219,0.88);
    color: #fff;
    display: grid;
    place-items: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    cursor: pointer;
    border: none;
    outline: none;
    transition: transform .14s ease, opacity .14s ease;
    opacity: 0.5;               /* 初始半透明 50% */
    transform: translateY(0) scale(1);
    backdrop-filter: blur(6px);
    font-weight:700;
  }
  .floating-btn.show{ opacity: 0.95; transform: translateY(0) scale(1); }
  .floating-btn:focus{ box-shadow: 0 0 0 4px rgba(45,156,219,0.18); }
  .floating-btn:hover{ transform: translateY(-3px) scale(1.02); }
  #scrollTopBtn{ background: rgba(45,156,219,0.85); }
  #pauseBtn{ background: rgba(231,76,60,0.92); }
  #resumeBtn{ background: rgba(46,204,113,0.92); }

  @media (max-width: 600px){
    :root{ --rh-px:56px; } /* 手機縮小段/行欄位 */
    .p{font-size:18px}
    .k{font-size:12px}
    .r{font-size:11px}
    .kana-cell .cell-inner{padding:10px 6px}
    table{font-size:13px}
  }

  @media (max-width: 420px){
    :root{ --rh-px:48px; }
    .p{font-size:16px}
    .k{font-size:11px}
    .r{font-size:10px}
  }
</style>
</head>
<body>
  <h1>🇯🇵 本機離線真人日文 104 音表</h1>
  <div id="modeStatus" class="mode-tip">🔊 就緒</div>

  <div class="controls">
    <div class="cg">
      <button id="vBtn">⬇️ 直行朗讀</button>
      <button id="hBtn">➡️ 橫行朗讀</button>
      <button class="stop" id="stopBtn">⏹ 停止</button>
    </div>

    <div class="cg">
      <label style="cursor:pointer"><input type="checkbox" id="loopCheck"> 🔁 LOOP</label>
    </div>

    <div class="cg">
      <label><b>語速（間隔）</b></label>
      <input id="rate" type="range" min="0.6" max="3.0" step="0.1" value="2.0" oninput="document.getElementById('rv').innerText=this.value+'x'">
      <span id="rv">2.0x</span>
    </div>

    <div class="cg">
      <label><b>連讀次數：</b></label>
      <select id="rep"><option value="1">一次</option><option value="2">兩次</option><option value="3">三次</option></select>
    </div>

    <div class="cg">
      <label style="cursor:pointer"><input type="checkbox" id="originCheck"> 📜 顯示平假名字源</label>
    </div>

    <div class="cg">
      <label style="cursor:pointer"><input type="checkbox" id="katakanaOriginCheck"> 🎴 顯示片假名字源</label>
    </div>

    <div class="cg">
      <label style="cursor:pointer"><input type="checkbox" id="scrollCheck" checked> 🔽 自動跳轉</label>
    </div>

    <div style="flex-basis:100%;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <label style="font-weight:700">自動播放分類（可複選）：</label>
      <label><input type="checkbox" class="catCheck" value="seion" checked> 清音</label>
      <label><input type="checkbox" class="catCheck" value="dakuon"> 濁音/半濁音</label>
      <label><input type="checkbox" class="catCheck" value="youon"> 拗音</label>
    </div>
  </div>

  <!-- 表格：資料與建表程式碼在下方 JS 會填入 -->
  <h2 id="gTableTitle">清音</h2>
  <table id="gTable">
    <thead>
      <tr>
        <th class="rh">段/行</th>
        <th>あ行</th><th>か行</th><th>さ行</th><th>た行</th>
        <th>な行</th><th>は行</th><th>ま行</th><th>や行</th><th>ら行</th><th>わ行</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2 id="dTableTitle">濁音 / 半濁音</h2>
  <table id="dTable">
    <thead>
      <tr>
        <th class="rh">段/行</th>
        <th>が行</th><th>ざ行</th><th>だ行</th><th>ば行</th><th>ぱ行</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2 id="yTableTitle">拗音</h2>
  <table id="yTable">
    <thead>
      <tr>
        <th class="rh">拗音</th>
        <th>きゃ行</th><th>しゃ行</th><th>ちゃ行</th><th>にゃ行</th>
        <th>ひゃ行</th><th>みゃ行</th><th>りゃ行</th><th>ぎゃ行</th><th>じゃ行</th>
        <th>びゃ行</th><th>ぴゃ行</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="floating-group" aria-hidden="false">
    <button id="scrollTopBtn" class="floating-btn" aria-label="回到頁首" title="回到頁首">↑</button>
    <button id="pauseBtn" class="floating-btn" aria-label="暫停朗讀" title="暫停朗讀">⏸</button>
    <button id="resumeBtn" class="floating-btn" aria-label="繼續朗讀" title="繼續朗讀">▶</button>
  </div>

<script>
/* ===== 資料陣列（與你最初版本相同） ===== */
const matrix = [
  [["あ","ア","a","a.mp3","安","阿"],["か","カ","ka","ka.mp3","加","可"],["さ","サ","sa","sa.mp3","左","散"],["た","タ","ta","ta.mp3","太","多"],["な","ナ","na","na.mp3","奈","那"],["は","ハ","ha","ha.mp3","波","八"],["ま","マ","ma","ma.mp3","末","万"],["や","ヤ","ya","ya.mp3","也","耶"],["ら","ラ","ra","ra.mp3","良","羅"],["わ","ワ","wa","wa.mp3","和","倭"]],
  [["い","イ","i","i.mp3","以","伊"],["き","キ","ki","ki.mp3","幾","企"],["し","シ","shi","shi.mp3","之","志"],["ち","チ","chi","chi.mp3","知","千"],["に","ニ","ni","ni.mp3","仁","尼"],["ひ","ヒ","hi","hi.mp3","比","卑"],["み","ミ","mi","mi.mp3","美","三"],["","","",""],["り","リ","ri","ri.mp3","利","里"],["","","",""]],
  [["う","ウ","u","u.mp3","宇","右"],["く","ク","ku","ku.mp3","久","句"],["す","ス","su","su.mp3","須","寸"],["つ","ツ","tsu","tsu.mp3","川","津"],["ぬ","ヌ","nu","nu.mp3","奴","怒"],["ふ","フ","fu","fu.mp3","不","夫"],["む","ム","mu","mu.mp3","武","夢"],["ゆ","ユ","yu","yu.mp3","由","遊"],["る","ル","ru","ru.mp3","流","留"],["","","",""]],
  [["え","エ","e","e.mp3","江","衣"],["け","ケ","ke","ke.mp3","計","介"],["せ","セ","se","se.mp3","世","勢"],["て","テ","te","te.mp3","天","丁"],["ね","ネ","ne","ne.mp3","祢","禰"],["へ","ヘ","he","he.mp3","部","戸"],["め","メ","me","me.mp3","女","米"],["","","",""],["れ","レ","re","re.mp3","礼","麗"],["","","",""]],
  [["お","オ","o","o.mp3","於","雄"],["こ","コ","ko","ko.mp3","己","古"],["そ","ソ","so","so.mp3","曽","祖"],["と","ト","to","to.mp3","止","登"],["の","ノ","no","no.mp3","乃","能"],["ほ","ホ","ho","ho.mp3","保","穂"],["も","モ","mo","mo.mp3","毛","母"],["よ","ヨ","yo","yo.mp3","与","余"],["ろ","ロ","ro","ro.mp3","呂","路"],["を","ヲ","wo","wo.mp3","乎","遠"]],
  [["","","",""],["","","",""],["","","",""],["","","",""],["","","",""],["","","",""],["","","",""],["","","",""],["","","",""],["ん","ン","n","n.mp3","无","恩"]]
];

const dakuon = [
  [["が","ガ","ga","ga.mp3"],["ざ","ザ","za","za.mp3"],["だ","ダ","da","da.mp3"],["ば","バ","ba","ba.mp3"],["ぱ","パ","pa","pa.mp3"]],
  [["ぎ","ギ","gi","gi.mp3"],["じ","ジ","ji","ji.mp3"],["ぢ","ヂ","ji","ji.mp3"],["び","ビ","bi","bi.mp3"],["ぴ","ピ","pi","pi.mp3"]],
  [["ぐ","グ","gu","gu.mp3"],["ず","ズ","zu","zu.mp3"],["づ","ヅ","zu","zu.mp3"],["ぶ","ブ","bu","bu.mp3"],["ぷ","プ","pu","pu.mp3"]],
  [["げ","ゲ","ge","ge.mp3"],["ぜ","ゼ","ze","ze.mp3"],["で","デ","de","de.mp3"],["べ","ベ","be","be.mp3"],["ぺ","ペ","pe","pe.mp3"]],
  [["ご","ゴ","go","go.mp3"],["ぞ","ゾ","zo","zo.mp3"],["ど","ド","do","do.mp3"],["ぼ","ボ","bo","bo.mp3"],["ぽ","ポ","po","po.mp3"]]
];

const youon = [
  [["きゃ","キャ","kya","kya.mp3"],["しゃ","シャ","sha","sha.mp3"],["ちゃ","チャ","cha","cha.mp3"],["にゃ","ニャ","nya","nya.mp3"],["ひゃ","ヒャ","hya","hya.mp3"],["みゃ","ミャ","mya","mya.mp3"],["りゃ","リャ","rya","rya.mp3"],["ぎゃ","ギャ","gya","gya.mp3"],["じゃ","ジャ","ja","ja.mp3"],["びゃ","ビャ","bya","bya.mp3"],["ぴゃ","ピャ","pya","pya.mp3"]],
  [["きゅ","キュ","kyu","kyu.mp3"],["しゅ","シュ","shu","shu.mp3"],["ちゅ","チュ","chu","chu.mp3"],["にゅ","ニュ","nyu","nyu.mp3"],["ひゅ","ヒュ","hyu","hyu.mp3"],["みゅ","ミュ","myu","myu.mp3"],["りゅ","リュ","ryu","ryu.mp3"],["ぎゅ","ギュ","gyu","gyu.mp3"],["じゅ","ジュ","ju","ju.mp3"],["びゅ","ビュ","byu","byu.mp3"],["ぴゅ","ピュ","pyu","pyu.mp3"]],
  [["きょ","キョ","kyo","kyo.mp3"],["しょ","ショ","sho","sho.mp3"],["ちょ","チョ","cho","cho.mp3"],["にょ","ニョ","nyo","nyo.mp3"],["ひょ","ヒョ","hyo","hyo.mp3"],["みょ","ミョ","myo","myo.mp3"],["りょ","リョ","ryo","ryo.mp3"],["ぎょ","ギョ","gyo","gyo.mp3"],["じょ","ジョ","jo","jo.mp3"],["びょ","ビョ","byo","byo.mp3"],["ぴょ","ピョ","pyo","pyo.mp3"]]
];

/* ===== 建表 ===== */
const rowNames = ["あ段(A)","い段(I)","う段(U)","え段(E)","お段(O)","撥音"];
const dRowNames = ["あ段(A)","い段(I)","う段(U)","え段(E)","お段(O)"];
const yRowNames = ["小あ段","小う段","小お段"];

function getExpectedCols(tableId){
  const ths = document.querySelectorAll(`#${tableId} thead tr th`);
  return Math.max(0, ths.length - 1);
}

function buildTable(data, tableId, rowNames){
  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = "";
  const cols = getExpectedCols(tableId);
  for (let rIdx = 0; rIdx < data.length; rIdx++){
    const rowData = data[rIdx] || [];
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="rh">${rowNames[rIdx] || ""}</td>`;
    for (let c=0;c<cols;c++){
      const cell = rowData[c] || null;
      const td = document.createElement("td");
      if (!cell || !cell[0]){
        td.className = "empty";
        td.innerHTML = "";
      } else {
        const id = `${tableId}-c-${rIdx}-${c}`;
        td.className = "kana-cell";
        td.id = id;
        td.innerHTML = `<div class="cell-inner"><div class="p">${cell[0]}</div><div class="k">${cell[1]||""}</div><div class="r">${cell[2]||""}</div>${cell[4]?`<div class="o">${cell[4]}</div>`:""}${cell[5]?`<div class="ko">${cell[5]}</div>`:""}</div>`;
        td.onclick = (ev) => { ev.stopPropagation(); playSingle(cell[0], cell[3], id); };
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

buildTable(matrix,"gTable",rowNames);
buildTable(dakuon,"dTable",dRowNames);
buildTable(youon,"yTable",yRowNames);

/* ===== 播放核心（保留原始行為，加入安全暫停/繼續） ===== */
let playList = [], isLoop=false, idx=0;
let jpVoice = null;
let currentAudio = null;          // 正在播放的 audio element（若為 MP3）
let pausedAudio = null;           // 暫停時保留的 audio element（不銷毀）
let ttsUtter = null;
let categoryStarts = [], scrolledCategories = new Set();
let manualPlayLock = false;
let playNextTimer = null;
let playNextRunning = false;

window._pauseState = { audioSrc:null, audioTime:0, ttsPaused:false, prevIsLoop:false, pausedIndex:null, lastMode:'v' };
window.isPaused = false;

function getJpVoice(){
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  jpVoice = voices.find(v=> v.lang && v.lang.startsWith("ja"));
}
if (window.speechSynthesis){ window.speechSynthesis.onvoiceschanged = getJpVoice; getJpVoice(); }

function markSpeaking(id, on){
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  if (on) el.classList.add("speaking");
  else el.classList.remove("speaking");
}

/* 單點播放（保留原始行為） */
async function playSingle(text, filename, id){
  if (manualPlayLock) return;
  manualPlayLock = true;
  // stop any current audio/tts
  if (currentAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }
  if (ttsUtter && window.speechSynthesis){ try{ window.speechSynthesis.cancel(); }catch(e){} ttsUtter = null; }

  markSpeaking(id, true);
  try { await playSound(text, filename); } catch(e) {}
  markSpeaking(id, false);
  manualPlayLock = false;
}

/* playSound: MP3 優先，失敗 fallback TTS */
function playSound(text, filename){
  return new Promise((resolve) => {
    // stop previous audio reference only if it's not the pausedAudio we want to resume later
    if (currentAudio && currentAudio !== pausedAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }

    // cancel TTS only when not paused
    if (ttsUtter && window.speechSynthesis && window.speechSynthesis.speaking && !window.isPaused){
      try{ window.speechSynthesis.cancel(); }catch(e){}
      ttsUtter = null;
    }

    let settled = false;
    const finish = () => { if (settled) return; settled = true; document.getElementById('modeStatus').innerText = "🔊 就緒"; resolve(); };

    function ttsFallback(){
      if (settled) return;
      if (!window.speechSynthesis){ finish(); return; }
      ttsUtter = new SpeechSynthesisUtterance(text);
      if (!jpVoice) getJpVoice();
      if (jpVoice) ttsUtter.voice = jpVoice;
      ttsUtter.lang = 'ja-JP';
      ttsUtter.rate = 1.0;
      ttsUtter.onstart = ()=> { document.getElementById('modeStatus').innerText = "🔊 TTS 朗讀"; };
      ttsUtter.onend = ()=> { ttsUtter = null; finish(); };
      ttsUtter.onerror = ()=> { ttsUtter = null; finish(); };
      try{ window.speechSynthesis.speak(ttsUtter); }catch(e){ finish(); }
    }

    if (filename){
      try {
        const audio = new Audio(filename);
        currentAudio = audio;
        // if we are resuming from a pausedAudio that matches this file, keep reference
        if (pausedAudio && pausedAudio.src === audio.src){
          // use pausedAudio instead
          audio.pause();
        }
        let handled = false;
        audio.onplay = ()=> { document.getElementById('modeStatus').innerText = "🟢 播放本機 MP3"; };
        audio.onended = ()=> { if (!handled){ handled = true; currentAudio = null; finish(); } };
        audio.onerror = ()=> { if (!handled){ handled = true; currentAudio = null; ttsFallback(); } };
        const p = audio.play();
        if (p && typeof p.then === 'function') {
          p.then(()=>{/* started */}).catch(()=> { if (!handled){ handled = true; currentAudio=null; ttsFallback(); } });
        }
      } catch(e){
        currentAudio = null;
        ttsFallback();
      }
    } else {
      ttsFallback();
    }
  });
}

/* resume stored audio if paused for this idx (use same audio element) */
function resumeStoredAudioIfAny(){
  return new Promise((resolve) => {
    const ps = window._pauseState;
    if (pausedAudio && ps.pausedIndex === idx){
      // resume the same audio element (user click will call play)
      currentAudio = pausedAudio;
      pausedAudio = null;
      // attach end handler to resolve when ends
      let handled = false;
      currentAudio.onended = ()=> { if (!handled){ handled = true; currentAudio = null; ps.audioSrc = null; ps.audioTime = 0; ps.pausedIndex = null; resolve(); } };
      currentAudio.onerror = ()=> { if (!handled){ handled = true; currentAudio = null; ps.audioSrc = null; ps.audioTime = 0; ps.pausedIndex = null; resolve(); } };
      // try to play (should be triggered by user gesture on resume button)
      // but if resumeStoredAudioIfAny is called from playNext (non-interactive), we do not auto-play here.
      resolve();
    } else if (ps.ttsPaused && window.speechSynthesis){
      try { window.speechSynthesis.resume(); ps.ttsPaused = false; } catch(e){}
      resolve();
    } else {
      resolve();
    }
  });
}

/* buildPlayList */
function buildPlayList(categories, mode){
  playList = []; categoryStarts = []; scrolledCategories = new Set();
  const order = ["seion","dakuon","youon"];
  order.forEach(cat=>{
    if (!categories.includes(cat)) return;
    const startIndex = playList.length;
    categoryStarts.push({category:cat,index:startIndex});
    let source = (cat==="seion")?matrix:(cat==="dakuon"?dakuon:youon);
    const tableId = (cat==="seion") ? "gTable" : (cat==="dakuon") ? "dTable" : "yTable";

    if (window._pauseState.lastMode === undefined) window._pauseState.lastMode = mode || 'v';

    if (mode === 'v'){
      const cols = getExpectedCols(tableId);
      for (let col=0; col<cols; col++){
        for (let row=0; row<source.length; row++){
          const cell = (source[row] && source[row][col]) ? source[row][col] : null;
          if (cell && cell[0]) playList.push({tableId,category:cat,id:`${tableId}-c-${row}-${col}`,t:cell[0],file:cell[3]});
        }
      }
    } else {
      for (let row=0; row<source.length; row++){
        const cols = source[row] ? source[row].length : 0;
        for (let col=0; col<cols; col++){
          const cell = source[row][col];
          if (cell && cell[0]) playList.push({tableId,category:cat,id:`${tableId}-c-${row}-${col}`,t:cell[0],file:cell[3]});
        }
      }
    }
  });

  // move ん to end
  const nItems = [], others = [];
  playList.forEach(item => {
    if (item.t === "ん" || item.t === "ン") nItems.push(item);
    else others.push(item);
  });
  playList = others.concat(nItems);
}

/* startAuto: must be triggered by user click (vBtn/hBtn) */
function startAuto(mode){
  window._pauseState.lastMode = mode || window._pauseState.lastMode || 'v';

  // clear residual timers and audio only if not paused
  if (playNextTimer){ clearTimeout(playNextTimer); playNextTimer = null; }
  if (currentAudio && !window.isPaused){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }
  if (ttsUtter && window.speechSynthesis && !window.isPaused){ try{ window.speechSynthesis.cancel(); }catch(e){} ttsUtter = null; }
  playNextRunning = false;

  if (isLoop) stopAuto();
  isLoop = true; idx = 0;
  const categories = Array.from(document.querySelectorAll(".catCheck:checked")).map(c=>c.value);
  if (categories.length === 0){ alert("請至少選擇一個分類"); isLoop=false; return; }
  buildPlayList(categories, mode);

  if (document.getElementById('scrollCheck')?.checked && categoryStarts.length>0){
    const first = categoryStarts[0].category;
    const tableId = first==="seion"?"gTable":first==="dakuon"?"dTable":"yTable";
    document.getElementById(tableId)?.scrollIntoView({behavior:'smooth',block:'start'});
    scrolledCategories.add(first);
  }

  document.getElementById('vBtn').disabled = true;
  document.getElementById('hBtn').disabled = true;
  playNext();
}

/* playNext with guard to avoid overlapping */
async function playNext(){
  if (playNextRunning) return;
  playNextRunning = true;

  try {
    if (!isLoop) { playNextRunning = false; return; }
    if (idx >= playList.length){
      if (document.getElementById('loopCheck').checked){ idx = 0; scrolledCategories.clear(); }
      else { stopAuto(); playNextRunning = false; return; }
    }

    for (const cs of categoryStarts){
      if (cs.index === idx && !scrolledCategories.has(cs.category) && document.getElementById('scrollCheck')?.checked){
        const tableId = cs.category==="seion"?"gTable":cs.category==="dakuon"?"dTable":"yTable";
        document.getElementById(tableId)?.scrollIntoView({behavior:'smooth',block:'start'});
        scrolledCategories.add(cs.category);
        break;
      }
    }

    document.querySelectorAll('.kana-cell.speaking').forEach(e=> e.classList.remove('speaking'));

    const cur = playList[idx];
    if (!cur){ idx++; playNextTimer = setTimeout(()=>{ playNextRunning=false; playNext(); },100); return; }

    markSpeaking(cur.id, true);

    const rep = parseInt(document.getElementById('rep').value) || 1;
    const speedSlider = parseFloat(document.getElementById('rate').value) || 1.2;
    const baseGap = 180;
    const gap = Math.max(40, Math.round(baseGap / speedSlider));

    for (let cnt=0; cnt<rep; cnt++){
      if (!isLoop) break;
      markSpeaking(cur.id, true);

      // If paused state stored this idx and pausedAudio exists, we do NOT auto-play it here.
      // We rely on user to press resume (user gesture) to actually call pausedAudio.play() or speechSynthesis.resume().
      if (window._pauseState.pausedIndex === idx && (pausedAudio || window._pauseState.ttsPaused)){
        // wait until user resumes; break loop to avoid auto-advancing
        playNextRunning = false;
        return;
      } else {
        await playSound(cur.t, cur.file);
      }

      await new Promise(res => {
        playNextTimer = setTimeout(res, gap);
      });
      if (!isLoop) break;
    }

    markSpeaking(cur.id, false);
    idx++;
    playNextTimer = setTimeout(()=>{ playNextRunning=false; playNext(); }, 80);
  } catch (err) {
    playNextRunning = false;
    throw err;
  }
}

/* stopAuto */
function stopAuto(){
  isLoop = false;
  if (playNextTimer){ clearTimeout(playNextTimer); playNextTimer = null; }
  playNextRunning = false;
  if (currentAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio=null; }
  if (ttsUtter && window.speechSynthesis){ try{ window.speechSynthesis.cancel(); }catch(e){} ttsUtter=null; }
  document.querySelectorAll('.kana-cell.speaking').forEach(e=> e.classList.remove('speaking'));
  document.getElementById('vBtn').disabled = false;
  document.getElementById('hBtn').disabled = false;
  document.getElementById('modeStatus').innerText = "🔊 就緒";
  manualPlayLock = false;
  window.isPaused = false;
  window._pauseState.audioSrc = null;
  window._pauseState.audioTime = 0;
  window._pauseState.ttsPaused = false;
  window._pauseState.prevIsLoop = false;
  window._pauseState.pausedIndex = null;
  pausedAudio = null;
}

/* pause: store current audio element and time; do NOT destroy audio element */
function pausePlaybackKeepPosition(){
  if (window.isPaused) return;
  window.isPaused = true;
  window._pauseState.prevIsLoop = !!window.isLoop;
  window._pauseState.wasPlaying = !!window.isLoop;
  window.isLoop = false;

  if (playNextTimer){ clearTimeout(playNextTimer); playNextTimer = null; }

  try {
    if (currentAudio && !currentAudio.paused){
      window._pauseState.audioSrc = currentAudio.src || null;
      window._pauseState.audioTime = currentAudio.currentTime || 0;
      window._pauseState.pausedIndex = idx;
      // keep the audio element so resume can call play() on it (user gesture)
      pausedAudio = currentAudio;
      try { currentAudio.pause(); } catch(e){}
      currentAudio = null;
    } else {
      window._pauseState.audioSrc = null;
      window._pauseState.audioTime = 0;
      window._pauseState.pausedIndex = idx;
    }
  } catch(e){
    window._pauseState.audioSrc = null;
    window._pauseState.audioTime = 0;
    window._pauseState.pausedIndex = idx;
  }

  try {
    if (ttsUtter && window.speechSynthesis && window.speechSynthesis.speaking){
      try { window.speechSynthesis.pause(); window._pauseState.ttsPaused = true; } catch(e){ window._pauseState.ttsPaused = false; }
      window._pauseState.pausedIndex = idx;
    } else {
      window._pauseState.ttsPaused = false;
    }
  } catch(e){
    window._pauseState.ttsPaused = false;
  }

  document.getElementById('modeStatus').innerText = "⏸ 已暫停";
}

/* resume: must be called from user click (resume button) to satisfy mobile autoplay policy */
function resumePlaybackFromPosition(){
  if (!window.isPaused) return;
  window.isPaused = false;
  window.isLoop = !!window._pauseState.prevIsLoop || true;
  document.getElementById('modeStatus').innerText = "▶ 繼續播放";

  // If we have a pausedAudio element, resume it directly (user gesture)
  if (pausedAudio){
    try {
      // restore time (safety)
      const t = Math.min(window._pauseState.audioTime || 0, pausedAudio.duration || window._pauseState.audioTime || 0);
      if (!isNaN(t) && isFinite(t)) {
        try { pausedAudio.currentTime = t; } catch(e){}
      }
    } catch(e){}
    // play must be triggered by user click (this function is called from resume button click)
    pausedAudio.play().then(()=> {
      currentAudio = pausedAudio;
      pausedAudio = null;
      // after resumed audio ends, continue auto flow
      currentAudio.onended = ()=> { currentAudio = null; setTimeout(()=> { if (!playNextRunning) playNext(); }, 80); };
    }).catch(()=> {
      // if play rejected, fallback: start playNext flow (user may need to interact)
      setTimeout(()=> { if (!playNextRunning) playNext(); }, 120);
    });
    window._pauseState.audioSrc = null;
    window._pauseState.audioTime = 0;
    window._pauseState.pausedIndex = null;
    return;
  }

  // If TTS was paused, resume it (user gesture)
  if (window._pauseState.ttsPaused && window.speechSynthesis){
    try { window.speechSynthesis.resume(); window._pauseState.ttsPaused = false; } catch(e){}
    // let playNext continue after a short delay
    setTimeout(()=> { if (!playNextRunning) playNext(); }, 120);
    return;
  }

  // Otherwise, simply call playNext to continue automatic flow
  setTimeout(()=> { if (!playNextRunning) playNext(); }, 120);
}

/* ===== UI 綁定（確保在 DOMContentLoaded） ===== */
document.addEventListener('DOMContentLoaded', () => {
  const scrollBtn = document.getElementById('scrollTopBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resumeBtn = document.getElementById('resumeBtn');

  // 顯示 floating 按鈕
  [scrollBtn, pauseBtn, resumeBtn].forEach(b => b && b.classList.add('show'));

  scrollBtn?.addEventListener('click', ()=> {
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e){ window.scrollTo(0,0); }
  });

  pauseBtn?.addEventListener('click', ()=>{
    pausePlaybackKeepPosition();
    pauseBtn.setAttribute('aria-pressed','true');
    resumeBtn.setAttribute('aria-pressed','false');
  });

  resumeBtn?.addEventListener('click', ()=>{
    // resume must be user gesture — this click handler directly calls resume
    resumePlaybackFromPosition();
    resumeBtn.setAttribute('aria-pressed','true');
    pauseBtn.setAttribute('aria-pressed','false');
  });

  document.getElementById('vBtn').addEventListener('click', ()=> startAuto('v'));
  document.getElementById('hBtn').addEventListener('click', ()=> startAuto('h'));
  document.getElementById('stopBtn').addEventListener('click', ()=> stopAuto());

  document.getElementById("originCheck").addEventListener('change', function(){
    const show = this.checked;
    document.querySelectorAll(".o").forEach(e => e.style.display = show ? "block" : "none");
  });
  document.getElementById("katakanaOriginCheck").addEventListener('change', function(){
    const show = this.checked;
    document.querySelectorAll(".ko").forEach(e => e.style.display = show ? "block" : "none");
  });

  // ensure scrollCheck default checked
  const sc = document.getElementById('scrollCheck');
  if (sc) sc.checked = true;
});
</script>
